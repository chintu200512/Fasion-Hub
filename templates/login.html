{% extends "base.html" %}

{% block content %}
<style>
    .login-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-card {
        background: white;
        border-radius: 20px;
        padding: 50px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        max-width: 450px;
        width: 90%;
    }
    .google-btn {
        background: white;
        color: #333;
        border: 2px solid #ddd;
        padding: 15px 30px;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 600;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 15px;
        transition: all 0.3s ease;
    }
    .google-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        border-color: #667eea;
    }
    .google-btn i {
        font-size: 1.5rem;
    }
</style>

<div class="login-container">
    <div class="login-card">
        <i class="fas fa-tshirt fa-4x mb-3" style="color: #667eea;"></i>
        <h2 class="mb-3">Welcome to FashionHub</h2>
        <p class="text-muted mb-4">Sign in to continue shopping</p>
        
        <a href="{{ url_for('google_login') }}" class="google-btn">
            <i class="fab fa-google"></i>
            Continue with Google
        </a>
        
        <p class="mt-4 text-muted small">
            By continuing, you agree to our Terms of Service
        </p>
    </div>
</div>
{% endblock %}
