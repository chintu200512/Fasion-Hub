{% extends "base.html" %}

{% block content %}
<style>
    .form-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 30px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        font-weight: 600;
        margin-bottom: 8px;
        display: block;
    }
    .form-control {
        width: 100%;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 10px;
    }
    .btn-submit {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 25px;
        font-weight: 600;
        width: 100%;
    }
    .image-preview {
        margin-top: 10px;
        max-width: 200px;
    }
</style>

<div class="container">
    <div class="form-container">
        <h2 class="text-center mb-4">Add New Product</h2>
        
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>Price (₹) *</label>
                <input type="number" name="price" class="form-control" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label>Category *</label>
                <select name="category" class="form-control" required>
                    <option value="">Select Category</option>
                    <option value="Men">Men's Fashion</option>
                    <option value="Women">Women's Fashion</option>
                    <option value="Kids">Kids' Fashion</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Footwear">Footwear</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Product Image *</label>
                <input type="file" name="image" class="form-control" accept="image/*" required onchange="previewImage(this)">
                <div class="image-preview" id="imagePreview"></div>
            </div>
            
            <div class="form-group">
                <label>Stock Quantity *</label>
                <input type="number" name="stock" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>Description *</label>
                <textarea name="description" class="form-control" rows="4" required></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Add Product</button>
        </form>
    </div>
</div>

<script>
function previewImage(input) {
    const preview = document.getElementById('imagePreview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.innerHTML = `<img src="${e.target.result}" style="max-width: 200px; border-radius: 10px;">`;
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
