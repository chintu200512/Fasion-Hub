<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .add-product-container {
        max-width: 800px;
        margin: 50px auto;
        padding: 30px;
        background: white;
        border-radius: 15px;
        box-shadow: var(--box-shadow);
    }
    
    .add-product-container h2 {
        color: var(--primary-color);
        margin-bottom: 30px;
        text-align: center;
        font-weight: 700;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        font-weight: 600;
        color: var(--primary-color);
        margin-bottom: 8px;
        display: block;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 10px 15px;
        border: 1px solid var(--light-color);
        border-radius: 8px;
        transition: var(--transition);
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: var(--secondary-color);
        box-shadow: 0 0 0 2px rgba(231, 76, 60, 0.1);
    }
    
    .checkbox-group {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin-top: 10px;
    }
    
    .checkbox-group label {
        display: flex;
        align-items: center;
        gap: 5px;
        font-weight: normal;
        cursor: pointer;
    }
    
    .checkbox-group input[type="checkbox"] {
        width: auto;
        margin-right: 5px;
        cursor: pointer;
    }
    
    .image-preview {
        margin-top: 10px;
        max-width: 200px;
        display: none;
    }
    
    .image-preview img {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--light-color);
    }
    
    .btn-submit {
        background: var(--secondary-color);
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        width: 100%;
        font-size: 1.1rem;
    }
    
    .btn-submit:hover {
        background: var(--primary-color);
        transform: translateY(-2px);
    }
    
    .alert {
        padding: 12px 20px;
        border-radius: 8px;
        margin-bottom: 20px;
    }
    
    .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }
    
    .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }
    
    @media (max-width: 768px) {
        .add-product-container {
            margin: 20px;
            padding: 20px;
        }
        
        .checkbox-group {
            gap: 10px;
        }
    }
</style>
<body>
<div class="container">
    <div class="add-product-container">
        <h2><i class="fas fa-plus-circle me-2"></i>Add New Product</h2>
        
        {% if error %}
        <div class="alert alert-error">
            <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
        </div>
        {% endif %}
        
        {% if success %}
        <div class="alert alert-success">
            <i class="fas fa-check-circle me-2"></i>{{ success }}
        </div>
        {% endif %}
        
        <form method="POST" enctype="multipart/form-data" id="productForm">
            <div class="form-group">
                <label for="name">Product Name *</label>
                <input type="text" id="name" name="name" required placeholder="Enter product name">
            </div>
            
            <div class="form-group">
                <label for="price">Price (₹) *</label>
                <input type="number" id="price" name="price" required placeholder="Enter price" step="1" min="0">
            </div>
            
            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" name="category" required>
                    <option value="">Select category</option>
                    <option value="men">Men's Fashion</option>
                    <option value="women">Women's Fashion</option>
                    <option value="kids">Kids' Fashion</option>
                    <option value="accessories">Accessories</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="subcategory">Subcategory</label>
                <input type="text" id="subcategory" name="subcategory" placeholder="e.g., tshirts, jeans, dresses">
            </div>
            
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Enter product description"></textarea>
            </div>
            
            <div class="form-group">
                <label for="stock">Stock Quantity *</label>
                <input type="number" id="stock" name="stock" required value="10" min="0">
            </div>
            
            <div class="form-group">
                <label for="rating">Rating (1-5)</label>
                <select id="rating" name="rating">
                    <option value="5">5 - Excellent</option>
                    <option value="4" selected>4 - Very Good</option>
                    <option value="3">3 - Good</option>
                    <option value="2">2 - Fair</option>
                    <option value="1">1 - Poor</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Sizes Available</label>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="sizes" value="XS"> XS
                    </label>
                    <label>
                        <input type="checkbox" name="sizes" value="S"> S
                    </label>
                    <label>
                        <input type="checkbox" name="sizes" value="M" checked> M
                    </label>
                    <label>
                        <input type="checkbox" name="sizes" value="L" checked> L
                    </label>
                    <label>
                        <input type="checkbox" name="sizes" value="XL"> XL
                    </label>
                    <label>
                        <input type="checkbox" name="sizes" value="XXL"> XXL
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label>Colors Available</label>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="colors" value="Black"> Black
                    </label>
                    <label>
                        <input type="checkbox" name="colors" value="White"> White
                    </label>
                    <label>
                        <input type="checkbox" name="colors" value="Blue" checked> Blue
                    </label>
                    <label>
                        <input type="checkbox" name="colors" value="Red"> Red
                    </label>
                    <label>
                        <input type="checkbox" name="colors" value="Green"> Green
                    </label>
                    <label>
                        <input type="checkbox" name="colors" value="Yellow"> Yellow
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="image">Product Image</label>
                <input type="file" id="image" name="image" accept="image/*" onchange="previewImage(this)">
                <div class="image-preview" id="imagePreview">
                    <img id="previewImg" src="#" alt="Preview">
                </div>
                <small class="text-muted">Supported formats: PNG, JPG, JPEG, GIF, WEBP</small>
            </div>
            
            <button type="submit" class="btn-submit">
                <i class="fas fa-save me-2"></i>Add Product
            </button>
        </form>
    </div>
</div>

<script>
    function previewImage(input) {
        const preview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                preview.style.display = 'block';
            }
            
            reader.readAsDataURL(input.files[0]);
        } else {
            preview.style.display = 'none';
        }
    }
    
    // Form validation
    document.getElementById('productForm').addEventListener('submit', function(e) {
        const name = document.getElementById('name').value;
        const price = document.getElementById('price').value;
        const category = document.getElementById('category').value;
        
        if (!name || !price || !category) {
            e.preventDefault();
            alert('Please fill in all required fields!');
            return false;
        }
        
        if (price < 0) {
            e.preventDefault();
            alert('Price cannot be negative!');
            return false;
        }
    });
</script>

</body>
</html>
