{% extends "base.html" %}

{% block content %}
<style>
    .profile-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 30px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .profile-header {
        text-align: center;
        margin-bottom: 30px;
    }
    .profile-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin: 0 auto 20px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .profile-avatar i {
        font-size: 3rem;
        color: white;
    }
    .info-group {
        margin-bottom: 20px;
    }
    .info-group label {
        font-weight: 600;
        display: block;
        margin-bottom: 5px;
        color: #666;
    }
    .info-group .value {
        padding: 10px;
        background: #f8f9fa;
        border-radius: 10px;
    }
    .edit-btn {
        background: #667eea;
        color: white;
        border: none;
        padding: 5px 15px;
        border-radius: 20px;
        cursor: pointer;
    }
    .edit-input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 10px;
    }
</style>

<div class="profile-container">
    <div class="profile-header">
        <div class="profile-avatar">
            <i class="fas fa-user"></i>
        </div>
        <h2>{{ user.name }}</h2>
        <p class="text-muted">{{ user.email }}</p>
    </div>
    
    <div id="alertMsg"></div>
    
    <div class="info-group">
        <label>Phone Number</label>
        <div id="phoneDisplay">
            <span class="value">{{ user.phone or 'Not provided' }}</span>
            <button class="edit-btn" onclick="editPhone()">Edit</button>
        </div>
        <div id="phoneEdit" style="display:none;">
            <input type="tel" id="phoneInput" class="edit-input" value="{{ user.phone or '' }}">
            <button class="btn btn-sm btn-success mt-2" onclick="savePhone()">Save</button>
            <button class="btn btn-sm btn-secondary mt-2" onclick="cancelPhone()">Cancel</button>
        </div>
    </div>
    
    <div class="info-group">
        <label>Delivery Address</label>
        <div id="addressDisplay">
            <span class="value">{{ user.address or 'Not provided' }}</span>
            <button class="edit-btn" onclick="editAddress()">Edit</button>
        </div>
        <div id="addressEdit" style="display:none;">
            <textarea id="addressInput" class="edit-input" rows="3">{{ user.address or '' }}</textarea>
            <button class="btn btn-sm btn-success mt-2" onclick="saveAddress()">Save</button>
            <button class="btn btn-sm btn-secondary mt-2" onclick="cancelAddress()">Cancel</button>
        </div>
    </div>
    
    <div class="info-group">
        <label>Member Since</label>
        <div class="value">{{ user.created_at.strftime('%B %d, %Y') if user.created_at else '2024' }}</div>
    </div>
    
    <div class="info-group">
        <label>Total Orders</label>
        <div class="value">{{ user.total_orders or 0 }} orders</div>
    </div>
</div>

<script>
function editPhone() {
    document.getElementById('phoneDisplay').style.display = 'none';
    document.getElementById('phoneEdit').style.display = 'block';
}

function cancelPhone() {
    document.getElementById('phoneDisplay').style.display = 'block';
    document.getElementById('phoneEdit').style.display = 'none';
}

function editAddress() {
    document.getElementById('addressDisplay').style.display = 'none';
    document.getElementById('addressEdit').style.display = 'block';
}

function cancelAddress() {
    document.getElementById('addressDisplay').style.display = 'block';
    document.getElementById('addressEdit').style.display = 'none';
}

async function savePhone() {
    const phone = document.getElementById('phoneInput').value;
    await updateProfile({ phone });
}

async function saveAddress() {
    const address = document.getElementById('addressInput').value;
    await updateProfile({ address });
}

async function updateProfile(data) {
    try {
        const response = await axios.post('/api/profile/update', data);
        if (response.data.success) {
            showAlert('Profile updated successfully!', 'success');
            setTimeout(() => location.reload(), 1500);
        }
    } catch (error) {
        showAlert('Error updating profile', 'danger');
    }
}

function showAlert(message, type) {
    const container = document.getElementById('alertMsg');
    container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
    setTimeout(() => container.innerHTML = '', 3000);
}
</script>
{% endblock %}
